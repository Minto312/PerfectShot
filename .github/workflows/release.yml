name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Tauri app
        run: npx --prefix frontend tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Tauri app (universal binary)
        run: npx --prefix frontend tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Tauri app
        run: npx --prefix frontend tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/keystore.jks
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV
            echo "Keystore decoded successfully"
          else
            echo "No signing keystore configured — APK will be unsigned"
          fi

      - name: Build Android APK
        run: |
          export NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973
          npx --prefix frontend tauri android build --target aarch64
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  publish-release:
    needs: [build-linux, build-macos, build-windows, build-android]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json for updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"

          WIN_SIG_FILE=$(find artifacts -name "*.exe.sig" -print -quit 2>/dev/null)
          LINUX_SIG_FILE=$(find artifacts -name "*.AppImage.sig" -print -quit 2>/dev/null)
          MACOS_SIG_FILE=$(find artifacts -name "*.app.tar.gz.sig" -print -quit 2>/dev/null)

          WIN_SIG=$(cat "$WIN_SIG_FILE" 2>/dev/null || true)
          LINUX_SIG=$(cat "$LINUX_SIG_FILE" 2>/dev/null || true)
          MACOS_SIG=$(cat "$MACOS_SIG_FILE" 2>/dev/null || true)

          WIN_EXE=$(find artifacts -name "*-setup.exe" ! -name "*.sig" -printf "%f" -quit 2>/dev/null)
          LINUX_AI=$(find artifacts -name "*.AppImage" ! -name "*.sig" -printf "%f" -quit 2>/dev/null)
          MACOS_TGZ=$(find artifacts -name "*.app.tar.gz" ! -name "*.sig" -printf "%f" -quit 2>/dev/null)

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_url "${BASE_URL}/${WIN_EXE}" \
            --arg win_sig "$WIN_SIG" \
            --arg linux_url "${BASE_URL}/${LINUX_AI}" \
            --arg linux_sig "$LINUX_SIG" \
            --arg macos_url "${BASE_URL}/${MACOS_TGZ}" \
            --arg macos_sig "$MACOS_SIG" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { url: $win_url, signature: $win_sig },
                "linux-x86_64": { url: $linux_url, signature: $linux_sig },
                "darwin-aarch64": { url: $macos_url, signature: $macos_sig },
                "darwin-x86_64": { url: $macos_url, signature: $macos_sig }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.msi
            artifacts/**/*-setup.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.apk
            latest.json
          draft: false
          generate_release_notes: true
